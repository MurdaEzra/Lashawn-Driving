services:
  - type: web
    name: lashawn-backend
    env: node
    branch: main
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: MPESA_CONSUMER_KEY
        value: ""
      - key: MPESA_CONSUMER_SECRET
        value: ""
      - key: MPESA_SHORTCODE
        value: ""
      - key: MPESA_PASSKEY
        value: ""
      - key: MPESA_CALLBACK_URL
        value: "https://lashawnacademy.com/api/stk-callback"
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ""
      - key: CORS_ORIGINS
        value: "https://lashawnacademy.com,http://localhost:5173"
      - key: PORT
        value: "4000"

  - type: static
    name: lashawn-frontend
    env: static
    branch: main
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: "https://<your-backend>.onrender.com"
